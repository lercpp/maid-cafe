<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yami Maid Café</title>

    <link rel="icon" href="/static/foto/cat.jpg" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/ak.css">
</head>
<body>

    <div class="but">
        <button onclick="history.back()">Назад</button>
    </div>

    <div class="profile-card">

        <div class="avatar">
            <img src="/static/foto/cat.jpg" alt="avatar">
        </div>

        <h2>Добро пожаловать, {{ name }}!</h2>

        <p class="role">Пользователь кафе</p>

        <div class="info">

            <div class="info-item">
                <span>Email:</span>
                <p ip="userEmai">{{ email }}</p>
            </div>

            <div class="info-item">
                <span>Заказы:</span>
                <p>0</p>
            </div>

        </div>

        <button class="btn logout" onclick="logout()">
            Выйти
        </button>

    </div>


</body>
</html>
