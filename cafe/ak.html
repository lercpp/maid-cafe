<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль | Yami Maid Café</title>

    <link rel="icon" href="foto/cat.jpg" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/ak.css">
</head>
<body>

    <div class="profile-card">

        <div class="avatar">
            <img src="foto/cat.jpg" alt="avatar">
        </div>

        <h2>Добро пожаловать, Yami!</h2>
        <p class="role">Пользователь кафе</p>

        <div class="info">
            <div class="info-item">
                <span>Email:</span>
                <p>user@mail.com</p>
            </div>

            <div class="info-item">
                <span>Баланс:</span>
                <p>1 250 ₽</p>
            </div>

            <div class="info-item">
                <span>Заказы:</span>
                <p>5</p>
            </div>
        </div>

        <button class="btn">Редактировать профиль</button>
        <button class="btn logout">Выйти</button>

    </div>

</body>
</html>
