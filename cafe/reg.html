<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yami Maid Café</title>
    <link rel="icon" href="foto/cat.jpg" type="image/png">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/profil.css">
</head>
<body>
    <div class="login-card">
        <h2>Создание аккаунта</h2>

        <form>

            <div class="input-group">
                <label for="name">Имя</label>
                <input type="text" id="name" placeholder="Введите имя">
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Введите email">
            </div>

            <div class="input-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" placeholder="Придумайте пароль">
            </div>

            <div class="input-group">
                <label for="confirm">Повтор пароля</label>
                <input type="password" id="confirm" placeholder="Повторите пароль">
            </div>

            <button type="submit" class="login-btn">Зарегистрироваться</button>
        </form>
    </div>

</body>
</html>
